# HAProxy Configuration - AgenteDeVoz
# Gap #13: Load Balancer Setup
# Version: 2.8

global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon
    maxconn 50000

    # TLS hardening
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    option  http-server-close
    option  redispatch
    retries 3
    timeout connect  5s
    timeout client   30s
    timeout server   30s
    timeout queue    60s
    timeout http-keep-alive 10s
    timeout http-request    15s
    timeout tunnel          1h
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# Stats dashboard
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-node
    stats show-legends
    stats auth admin:CHANGE_ME_IN_PROD
    stats admin if TRUE

# HTTP -> HTTPS redirect
frontend agentevoz_http
    bind *:80
    mode http
    redirect scheme https code 301

# Main HTTPS frontend
frontend agentevoz_https
    bind *:443 ssl crt /etc/haproxy/certs/agentevoz.pem
    mode http

    # Headers de seguridad
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains"
    http-response set-header X-Frame-Options "DENY"
    http-response set-header X-Content-Type-Options "nosniff"

    # Rate limiting via stick tables
    stick-table type ip size 100k expire 30s store conn_cur,conn_rate(10s),http_req_rate(10s)
    http-request track-sc0 src

    # Bloquear IPs con >200 req/10s
    acl is_abuser sc_http_req_rate(0) gt 200
    http-request deny deny_status 429 if is_abuser

    # Routing por path
    acl is_api path_beg /api/
    acl is_ws  hdr(Upgrade) -i websocket
    acl is_health path /health /ready /metrics

    use_backend agentevoz_api if is_api
    use_backend agentevoz_ws  if is_ws
    default_backend agentevoz_api

# API Backend (least connections para llamadas largas)
backend agentevoz_api
    balance leastconn
    timeout connect 5s
    timeout server  60s
    retries 3

    option httpchk GET /health
    http-check expect status 200

    server api1 agentevoz-api-1:8000 weight 1 maxconn 500 check inter 2s rise 2 fall 3
    server api2 agentevoz-api-2:8000 weight 1 maxconn 500 check inter 2s rise 2 fall 3
    server api3 agentevoz-api-3:8000 weight 1 maxconn 500 check inter 2s rise 2 fall 3 backup

# WebSocket Backend (source hash para sticky sessions)
backend agentevoz_ws
    balance source
    timeout tunnel 1h
    option http-server-close
    no option forceclose

    server ws1 agentevoz-api-1:8000 weight 1 maxconn 200 check inter 5s
    server ws2 agentevoz-api-2:8000 weight 1 maxconn 200 check inter 5s
