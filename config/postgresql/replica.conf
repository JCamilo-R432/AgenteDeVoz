# PostgreSQL Replica Configuration - AgenteDeVoz
# Gap #12: Database Replication
# Nodo: replica1

listen_addresses = '*'
port = 5432
max_connections = 200

#------------------------------------------------------------------------------
# STANDBY MODE
#------------------------------------------------------------------------------
hot_standby = on
hot_standby_feedback = on       # Informa al primario de queries activos
max_standby_streaming_delay = 30s
wal_receiver_status_interval = 10s
wal_receiver_timeout = 60s

# Conectar al primario
primary_conninfo = 'host=REPLACE_PRIMARY_HOST port=5432 user=replicator password=REPLACE_PASSWORD application_name=replica1 sslmode=prefer'
primary_slot_name = 'slot_replica1'

#------------------------------------------------------------------------------
# QUERY TUNING (igual que primario)
#------------------------------------------------------------------------------
shared_buffers = 256MB
effective_cache_size = 1GB
maintenance_work_mem = 64MB
work_mem = 4MB
random_page_cost = 1.1
effective_io_concurrency = 200

#------------------------------------------------------------------------------
# LOGGING
#------------------------------------------------------------------------------
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-replica-%Y-%m-%d_%H%M%S.log'
log_min_duration_statement = 1000
log_connections = on
log_line_prefix = '%m [%p] %q%u@%d [replica] '
