# ============================================================
# Agente de Voz - Docker Compose (Producción)
# Servicios: app, nginx, postgres, redis
# ============================================================

version: "3.9"

networks:
  agentevoz-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  app_logs:
  nginx_certs:

services:

  # ── Aplicación principal ─────────────────────────────────────────────────

  app:
    build:
      context: ../..
      dockerfile: src/deploy/Dockerfile
    image: agentevoz:1.0.0
    container_name: agentevoz_app
    restart: unless-stopped
    env_file:
      - ../../config/production.env
    environment:
      - DATABASE_URL=postgresql://agentevoz:${POSTGRES_PASSWORD}@postgres:5432/agentevoz
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - app_logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agentevoz-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx reverse proxy ──────────────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    container_name: agentevoz_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs
      - app_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - agentevoz-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── PostgreSQL ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: agentevoz_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentevoz
      POSTGRES_USER: agentevoz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=es_CO.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../integrations/database_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"    # Solo localhost
    networks:
      - agentevoz-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentevoz -d agentevoz"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis ────────────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: agentevoz_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"    # Solo localhost
    networks:
      - agentevoz-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
