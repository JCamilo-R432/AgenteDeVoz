# ============================================================
# Agente de Voz - Nginx Configuration
# Reverse proxy con SSL, rate limiting, y WebSocket support
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Compresion
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=webhooks:10m rate=60r/m;

    # Upstream
    upstream agentevoz_app {
        server app:8000;
        keepalive 32;
    }

    # ── HTTP -> HTTPS redirect ────────────────────────────────────────────

    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS principal ───────────────────────────────────────────────────

    server {
        listen 443 ssl http2;
        server_name agentevoz.tuempresa.com;

        # SSL (reemplazar con certificados reales de Let's Encrypt)
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Tamaño máximo de cuerpo (para uploads de audio)
        client_max_body_size 10m;

        # ── API REST ──────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://agentevoz_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # ── Webhooks Twilio/WhatsApp (mayor rate) ─────────────────────────
        location /api/v1/webhooks/ {
            limit_req zone=webhooks burst=20 nodelay;

            proxy_pass http://agentevoz_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # ── WebSocket ─────────────────────────────────────────────────────
        location /ws/ {
            proxy_pass http://agentevoz_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;    # 1 hora para llamadas largas
            proxy_send_timeout 3600s;
        }

        # ── Dashboard ─────────────────────────────────────────────────────
        location /dashboard/ {
            proxy_pass http://agentevoz_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket para live updates del dashboard
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Static files del dashboard ────────────────────────────────────
        location /dashboard/static/ {
            proxy_pass http://agentevoz_app;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ── Health check sin log ──────────────────────────────────────────
        location /api/v1/ping {
            proxy_pass http://agentevoz_app;
            access_log off;
        }

        # ── Default ───────────────────────────────────────────────────────
        location / {
            return 302 /dashboard;
        }
    }
}
